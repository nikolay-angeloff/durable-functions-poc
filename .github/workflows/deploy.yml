name: Deploy to Azure

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

env:
  NODE_VERSION: "20.x"
  # Override org/runner defaults that point npm at a private Nexus (avoids E401 in CI).
  NPM_CONFIG_REGISTRY: https://registry.npmjs.org/

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # npm ci uses tarball URLs from package-lock.json; corporate registries in the lockfile
      # ignore NPM_CONFIG_REGISTRY and cause E401 on GitHub-hosted runners.
      - name: Reject corporate URLs in package-lock.json
        run: |
          set -euo pipefail
          bad=0
          for f in functions/package-lock.json frontend/package-lock.json frontend-monitor/package-lock.json; do
            if [ ! -f "$f" ]; then
              continue
            fi
            if grep -qE 'artifactory\.|swospi\.softwareone|/repository/cmp-npm-virtual/' "$f"; then
              echo "::error file=$f::Lockfile points at a corporate npm mirror. Regenerate: cd $(dirname "$f") && rm -rf node_modules package-lock.json && npm install"
              bad=1
            fi
          done
          if [ "$bad" -ne 0 ]; then
            exit 1
          fi

      # Use Azure CLI directly — avoids azure/login OIDC path when creds JSON is missing/misconfigured.
      # Separate secrets (no single JSON required).
      - name: Azure CLI login (service principal)
        run: |
          set -euo pipefail
          az login --service-principal \
            -u "${{ secrets.AZURE_CLIENT_ID }}" \
            -p "${{ secrets.AZURE_CLIENT_SECRET }}" \
            --tenant "${{ secrets.AZURE_TENANT_ID }}"
          az account set --subscription "${{ secrets.AZURE_SUBSCRIPTION_ID }}"

      - name: Deploy infrastructure (Bicep)
        id: infra
        run: |
          set -euo pipefail
          DEPLOY_NAME="deploy-${{ github.run_id }}"
          FUNC=$(az deployment group create \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --name "$DEPLOY_NAME" \
            --template-file infra/bicep/main.bicep \
            --parameters @infra/bicep/parameters/demo.parameters.json \
            --query "properties.outputs.functionAppName.value" -o tsv)
          SWA_HOST=$(az deployment group show \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --name "$DEPLOY_NAME" \
            --query "properties.outputs.staticWebAppHostname.value" -o tsv)
          SWA_MON_HOST=$(az deployment group show \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --name "$DEPLOY_NAME" \
            --query "properties.outputs.staticWebAppMonitorHostname.value" -o tsv)
          SWA_NAME=$(az deployment group show \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --name "$DEPLOY_NAME" \
            --query "properties.outputs.staticWebAppName.value" -o tsv)
          SWA_MON_NAME=$(az deployment group show \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --name "$DEPLOY_NAME" \
            --query "properties.outputs.staticWebAppMonitorName.value" -o tsv)
          echo "function_app=$FUNC" >> "$GITHUB_OUTPUT"
          echo "swa_host=$SWA_HOST" >> "$GITHUB_OUTPUT"
          echo "swa_monitor_host=$SWA_MON_HOST" >> "$GITHUB_OUTPUT"
          echo "swa_name=$SWA_NAME" >> "$GITHUB_OUTPUT"
          echo "swa_monitor_name=$SWA_MON_NAME" >> "$GITHUB_OUTPUT"

      # Form + monitor SWA each need a deployment token. If both GitHub secrets are unset,
      # the logged-in service principal fetches them (no Portal copy). Set both secrets to override.
      - name: Resolve Static Web Apps deployment tokens
        id: swa_tokens
        env:
          RG: ${{ secrets.AZURE_RESOURCE_GROUP }}
          SECRET_FORM: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          SECRET_MON: ${{ secrets.AZURE_STATIC_WEB_APPS_MONITOR_API_TOKEN }}
        run: |
          set -euo pipefail
          append_token_output() {
            local out_name="$1" val="$2"
            echo "::add-mask::${val}"
            {
              echo "${out_name}<<SWA_TOKEN_EOF"
              echo "${val}"
              echo "SWA_TOKEN_EOF"
            } >> "$GITHUB_OUTPUT"
          }
          if [ -n "${SECRET_FORM:-}" ] && [ -n "${SECRET_MON:-}" ]; then
            append_token_output form_token "${SECRET_FORM}"
            append_token_output monitor_token "${SECRET_MON}"
            echo "token_source=github_secrets" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -n "${SECRET_FORM:-}" ] || [ -n "${SECRET_MON:-}" ]; then
            echo "::error::Set both AZURE_STATIC_WEB_APPS_API_TOKEN and AZURE_STATIC_WEB_APPS_MONITOR_API_TOKEN, or remove both so Azure CLI can read tokens for the form SWA (${{ steps.infra.outputs.swa_name }}) and monitor SWA (${{ steps.infra.outputs.swa_monitor_name }})."
            exit 1
          fi
          FORM_TOKEN=$(az staticwebapp secrets list \
            --name "${{ steps.infra.outputs.swa_name }}" \
            --resource-group "$RG" \
            --query "properties.apiKey" -o tsv)
          MON_TOKEN=$(az staticwebapp secrets list \
            --name "${{ steps.infra.outputs.swa_monitor_name }}" \
            --resource-group "$RG" \
            --query "properties.apiKey" -o tsv)
          if [ -z "${FORM_TOKEN}" ] || [ -z "${MON_TOKEN}" ]; then
            echo "::error::Could not read SWA deployment tokens via Azure CLI. Grant the service principal permission to list Static Web App secrets on the resource group, or add both deployment tokens as GitHub secrets (Portal → each Static Web App → Manage deployment token)."
            exit 1
          fi
          append_token_output form_token "${FORM_TOKEN}"
          append_token_output monitor_token "${MON_TOKEN}"
          echo "token_source=azure_cli" >> "$GITHUB_OUTPUT"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Azure Functions Core Tools
        run: npm install -g azure-functions-core-tools@4 --unsafe-perm true

      - name: Build & publish Function App
        env:
          FUNC_NAME: ${{ steps.infra.outputs.function_app }}
        run: |
          set -euo pipefail
          cd functions
          npm ci
          npm run build
          func azure functionapp publish "$FUNC_NAME" --javascript

      # APIs run on the Function App, not on SWA (api_location is empty). The SPA must call
      # https://<func>.azurewebsites.net/api/... — relative /api/* on the SWA host returns 405.
      - name: Build frontend (form)
        working-directory: frontend
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL != '' && secrets.VITE_API_BASE_URL || format('https://{0}.azurewebsites.net/api', steps.infra.outputs.function_app) }}
        run: |
          npm ci
          npm run build

      - name: Build frontend (monitor)
        working-directory: frontend-monitor
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL != '' && secrets.VITE_API_BASE_URL || format('https://{0}.azurewebsites.net/api', steps.infra.outputs.function_app) }}
          VITE_FORM_APP_BASE_URL: https://${{ steps.infra.outputs.swa_host }}
        run: |
          npm ci
          npm run build

      - name: Deploy Static Web App (form)
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.swa_tokens.outputs.form_token }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: frontend/dist
          api_location: ""
          skip_app_build: true

      - name: Deploy Static Web App (monitor)
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.swa_tokens.outputs.monitor_token }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: frontend-monitor/dist
          api_location: ""
          skip_app_build: true
