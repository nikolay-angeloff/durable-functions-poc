name: Deploy to Azure

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

env:
  NODE_VERSION: "20.x"
  # Override org/runner defaults that point npm at a private Nexus (avoids E401 in CI).
  NPM_CONFIG_REGISTRY: https://registry.npmjs.org/

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Use Azure CLI directly — avoids azure/login OIDC path when creds JSON is missing/misconfigured.
      # Separate secrets (no single JSON required).
      - name: Azure CLI login (service principal)
        run: |
          set -euo pipefail
          az login --service-principal \
            -u "${{ secrets.AZURE_CLIENT_ID }}" \
            -p "${{ secrets.AZURE_CLIENT_SECRET }}" \
            --tenant "${{ secrets.AZURE_TENANT_ID }}"
          az account set --subscription "${{ secrets.AZURE_SUBSCRIPTION_ID }}"

      - name: Deploy infrastructure (Bicep)
        id: infra
        run: |
          set -euo pipefail
          DEPLOY_NAME="deploy-${{ github.run_id }}"
          FUNC=$(az deployment group create \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --name "$DEPLOY_NAME" \
            --template-file infra/bicep/main.bicep \
            --parameters @infra/bicep/parameters/demo.parameters.json \
            --query "properties.outputs.functionAppName.value" -o tsv)
          SWA_HOST=$(az deployment group show \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --name "$DEPLOY_NAME" \
            --query "properties.outputs.staticWebAppHostname.value" -o tsv)
          SWA_MON_HOST=$(az deployment group show \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --name "$DEPLOY_NAME" \
            --query "properties.outputs.staticWebAppMonitorHostname.value" -o tsv)
          echo "function_app=$FUNC" >> "$GITHUB_OUTPUT"
          echo "swa_host=$SWA_HOST" >> "$GITHUB_OUTPUT"
          echo "swa_monitor_host=$SWA_MON_HOST" >> "$GITHUB_OUTPUT"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Azure Functions Core Tools
        run: npm install -g azure-functions-core-tools@4 --unsafe-perm true

      - name: Build & publish Function App
        env:
          FUNC_NAME: ${{ steps.infra.outputs.function_app }}
        run: |
          set -euo pipefail
          cd functions
          npm ci
          npm run build
          func azure functionapp publish "$FUNC_NAME" --javascript

      # APIs run on the Function App, not on SWA (api_location is empty). The SPA must call
      # https://<func>.azurewebsites.net/api/... — relative /api/* on the SWA host returns 405.
      - name: Build frontend (form)
        working-directory: frontend
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL != '' && secrets.VITE_API_BASE_URL || format('https://{0}.azurewebsites.net/api', steps.infra.outputs.function_app) }}
        run: |
          npm ci
          npm run build

      - name: Build frontend (monitor)
        working-directory: frontend-monitor
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL != '' && secrets.VITE_API_BASE_URL || format('https://{0}.azurewebsites.net/api', steps.infra.outputs.function_app) }}
          VITE_FORM_APP_BASE_URL: https://${{ steps.infra.outputs.swa_host }}
        run: |
          npm ci
          npm run build

      - name: Require Static Web Apps deployment tokens
        env:
          SWA_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          SWA_MONITOR_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_MONITOR_API_TOKEN }}
        run: |
          if [ -z "${SWA_TOKEN:-}" ]; then
            echo "::error::Missing secret AZURE_STATIC_WEB_APPS_API_TOKEN (form app). Azure Portal → first Static Web App → Manage deployment token."
            exit 1
          fi
          if [ -z "${SWA_MONITOR_TOKEN:-}" ]; then
            echo "::error::Missing secret AZURE_STATIC_WEB_APPS_MONITOR_API_TOKEN (monitor app). Bicep creates a second Static Web App (*-monswa-*); open it in Portal → Manage deployment token."
            exit 1
          fi

      - name: Deploy Static Web App (form)
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: frontend/dist
          api_location: ""
          skip_app_build: true

      - name: Deploy Static Web App (monitor)
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_MONITOR_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: frontend-monitor/dist
          api_location: ""
          skip_app_build: true
